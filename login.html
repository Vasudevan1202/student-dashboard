<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body class="auth-page">

    <!-- Brand -->
    <div class="auth-brand">
        <span class="brand-icon">📘</span>
        <h1>Student Dashboard</h1>
        <p>Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="auth-card">
        <h2>Welcome back</h2>

        <div class="input-group">
            <label for="loginUser">Email</label>
            <input type="email" id="loginUser" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label for="loginPass">Password</label>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button onclick="login()" style="margin-top:6px;">Sign In</button>

        <div class="auth-divider"><span>or continue with</span></div>

        <button class="btn-google" onclick="googleLogin()">
            <span class="g-icon">🌐</span> Sign in with Google
        </button>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
