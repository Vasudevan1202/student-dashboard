<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body class="auth-page">

    <!-- Brand -->
    <div class="auth-brand">
        <span class="brand-icon">📘</span>
        <h1>Student Dashboard</h1>
        <p>Create your free account</p>
    </div>

    <!-- Card -->
    <div class="auth-card">
        <h2>Get started</h2>

        <div class="input-group">
            <label for="regUser">Email</label>
            <input type="email" id="regUser" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label for="regPass">Password</label>
            <input type="password" id="regPass" placeholder="Min. 6 characters" autocomplete="new-password">
        </div>

        <button onclick="register()" style="margin-top:6px;">Create Account</button>

        <div class="auth-divider"><span>or continue with</span></div>

        <button class="btn-google" onclick="googleLogin()">
            <span class="g-icon">🌐</span> Sign up with Google
        </button>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
